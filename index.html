<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sonoscope</title>
    <style>
      /* Loading screen shown until the Svelte app mounts (removed in main.ts).
         Inlined so it paints with the first HTML frame, before any JS loads. */
      #splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        background: #fff;
        color: #737373;
        font-family: system-ui, sans-serif;
        z-index: 9999;
      }
      #splash .wordmark {
        font-size: 0.95rem;
        font-weight: 600;
        color: #171717;
      }
      #splash .spinner {
        width: 1.5rem;
        height: 1.5rem;
        border: 2px solid #e5e5e5;
        border-top-color: #171717;
        border-radius: 50%;
        animation: splash-spin 0.8s linear infinite;
      }
      @keyframes splash-spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <div class="spinner"></div>
      <div class="wordmark">Sonoscope</div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
